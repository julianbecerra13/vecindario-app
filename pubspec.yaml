name: vecindario_app
description: "Tu comunidad, conectada. App para comunidades residenciales en Colombia."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase Core
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.0
  cloud_firestore: ^5.5.0
  firebase_storage: ^12.3.0
  firebase_messaging: ^15.1.0
  firebase_analytics: ^11.3.0
  firebase_remote_config: ^5.1.0

  # Fonts
  google_fonts: ^6.2.1

  # Auth Social
  google_sign_in: ^6.2.0
  sign_in_with_apple: ^6.1.0
  crypto: ^3.0.3

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navegacion
  go_router: ^14.6.2

  # UI
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.16
  photo_view: ^0.15.0
  image_picker: ^1.1.2
  flutter_staggered_grid_view: ^0.7.0

  # HTTP Client
  http: ^1.2.1

  # Utilidades
  intl: ^0.20.2
  url_launcher: ^6.3.1
  share_plus: ^10.1.4
  connectivity_plus: ^6.1.1
  package_info_plus: ^8.1.1
  permission_handler: ^11.3.1
  uuid: ^4.5.1
  timeago: ^3.7.0

  # Gráficos y Calendario (Premium)
  fl_chart: ^0.69.0
  table_calendar: ^3.1.3

  # Almacenamiento local
  shared_preferences: ^2.3.5

  # Notificaciones locales
  flutter_local_notifications: ^18.0.1

  # Modelo / Serializacion
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  equatable: ^2.0.7

  # Logging
  logger: ^2.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  # Code Generation
  build_runner: ^2.4.14
  riverpod_generator: ^2.6.3
  freezed: ^2.5.8
  json_serializable: ^6.9.4
  riverpod_lint: ^2.6.3

  # Testing
  mocktail: ^1.0.4
  fake_cloud_firestore: ^3.1.0
  firebase_storage_mocks: ^0.7.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/images/onboarding/
    - assets/icons/
